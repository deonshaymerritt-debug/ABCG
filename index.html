<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Battle Arena - Digital Card Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #0b0c10;
            color: #c5a880;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- AUTH SCREEN OVERLAY --- */
        #authScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0c10;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .auth-card {
            background-color: #151922;
            border: 2px solid #45f3ff;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 25px rgba(69, 243, 255, 0.2);
            text-align: center;
        }

        .auth-card h2 {
            color: #ecf0f1;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .auth-form input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background-color: #1f2833;
            border: 1px solid #c5a880;
            border-radius: 6px;
            color: #ecf0f1;
            font-size: 1rem;
        }

        .auth-form input:focus {
            outline: none;
            border-color: #45f3ff;
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background-color: #45f3ff;
            color: #0b0c10;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .auth-btn:hover {
            background-color: #33cfdb;
            box-shadow: 0 0 10px rgba(69, 243, 255, 0.4);
        }

        .error-msg {
            color: #ff4545;
            margin-top: 15px;
            font-size: 0.9rem;
            min-height: 20px;
        }

        /* --- MAIN GAME INTERFACE (Hidden until Logged In) --- */
        #gameScreen {
            display: none;
            padding: 20px;
            width: 100%;
        }

        header {
            text-align: center;
            padding: 20px 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #1f2833;
            position: relative;
        }

        header h1 {
            color: #ecf0f1;
            font-size: 2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .logout-btn {
            position: absolute;
            right: 10px;
            top: 25px;
            background: transparent;
            border: 1px solid #ff4545;
            color: #ff4545;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .game-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .tab-btn {
            background-color: #1f2833;
            color: #c5a880;
            border: 2px solid #45f3ff;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .tab-btn.active, .tab-btn:hover {
            background-color: #45f3ff;
            color: #0b0c10;
            box-shadow: 0 0 15px rgba(69, 243, 255, 0.5);
        }

        .deck-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            justify-items: center;
        }

        /* Pure Photographic / Illustrative Cards - NO Text Layout Box overrides */
        .card {
            width: 180px;
            height: 270px;
            border-radius: 14px;
            overflow: hidden;
            background-color: #151922;
            box-shadow: 0 10px 20px rgba(0,0,0,0.7);
            border: 2px solid #1f2833;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .card.character-card { border-color: #c5a880; }
        .card.special-card { border-color: #ff4545; }

        .card-artwork {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .status-message {
            text-align: center;
            font-style: italic;
            color: #666;
            grid-column: 1 / -1;
            padding: 50px 0;
        }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="auth-card">
            <h2>Arena Login</h2>
            <div class="auth-form">
                <input type="email" id="emailInput" placeholder="Enter Email" required>
                <input type="password" id="passwordInput" placeholder="Enter Password" required>
                <button class="auth-btn" id="loginBtn">Enter Battle Arena</button>
            </div>
            <div class="error-msg" id="authError"></div>
        </div>
    </div>

    <div id="gameScreen">
        <header>
            <h1>Anime Battle Arena</h1>
            <button class="logout-btn" id="logoutBtn">Log Out</button>
        </header>

        <div class="game-tabs">
            <button class="tab-btn active" id="tabCharBtn">Character Cards</button>
            <button class="tab-btn" id="tabSpecBtn">Action Specials</button>
        </div>

        <main id="gameDeck" class="deck-container">
            <div class="status-message">Loading arena assets...</div>
        </main>
    </div>

    <script src="characters.js"></script>
    <script src="specials.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

        // Your active Firebase Configuration credentials
        const firebaseConfig = {
            apiKey: "AIzaSyCOY7xiGlGu3b1L5M1DuylaULxHRfj7GrE",
            authDomain: "anime-battle-arena-c9777.firebaseapp.com",
            databaseURL: "https://anime-battle-arena-c9777-default-rtdb.firebaseio.com",
            projectId: "anime-battle-arena-c9777",
            storageBucket: "anime-battle-arena-c9777.firebasestorage.app",
            messagingSenderId: "756648612874",
            appId: "1:756648612874:web:5d15b4cf6e7dc26b247bf3",
            measurementId: "G-WET1B82Z64"
        };

        // Connect System to Firebase Server Instantiations
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // UI Element Tracking Variables
        const authScreen = document.getElementById('authScreen');
        const gameScreen = document.getElementById('gameScreen');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const authError = document.getElementById('authError');
        const deckGrid = document.getElementById('gameDeck');

        const tabCharBtn = document.getElementById('tabCharBtn');
        const tabSpecBtn = document.getElementById('tabSpecBtn');

        let currentTab = 'characters';

        // --- FIREBASE SECURITY STATE LISTENER ---
        // Automatically checks if user credentials match or if someone is already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Access granted! Hide login wall, show custom decks
                authScreen.style.display = 'none';
                gameScreen.style.display = 'block';
                switchDeck('characters');
            } else {
                // Access locked. Bring back user authentication gate
                gameScreen.style.display = 'none';
                authScreen.style.display = 'flex';
                emailInput.value = '';
                passwordInput.value = '';
            }
        });

        // --- AUTHENTICATION INTERACTION LOGIC ---
        loginBtn.addEventListener('click', () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            authError.textContent = "";

            if(!email || !password) {
                authError.textContent = "Please enter both fields.";
                return;
            }

            signInWithEmailAndPassword(auth, email, password)
                .catch((error) => {
                    console.error(error);
                    authError.textContent = "Invalid Credentials. Access Denied.";
                });
        });

        logoutBtn.addEventListener('click', () => {
            signOut(auth).catch(err => console.error(err));
        });

        // --- INTERACTIVE CARD RENDER ENGINE ---
        function switchDeck(deckType) {
            currentTab = deckType;
            deckGrid.innerHTML = ''; 

            if (deckType === 'characters') {
                tabCharBtn.classList.add('active');
                tabSpecBtn.classList.remove('active');

                if (typeof characterData !== 'undefined' && characterData.length > 0) {
                    characterData.forEach(character => {
                        const cardElement = document.createElement('div');
                        cardElement.className = 'card character-card';
                        const imgUrl = character.image || character.img || '';
                        cardElement.innerHTML = `<img src="${imgUrl}" alt="${character.name || 'Character'}" class="card-artwork" onerror="this.src='https://placehold.co/180x270/151922/c5a880?text=Card+Art'">`;
                        deckGrid.appendChild(cardElement);
                    });
                } else {
                    deckGrid.innerHTML = '<div class="status-message">Error: "characterData" array missing or empty in characters.js</div>';
                }
            } else if (deckType === 'specials') {
                tabSpecBtn.classList.add('active');
                tabCharBtn.classList.remove('active');

                if (typeof specialsData !== 'undefined' && specialsData.length > 0) {
                    specialsData.forEach(special => {
                        const cardElement = document.createElement('div');
                        cardElement.className = 'card special-card';
                        const imgUrl = special.image || special.img || '';
                        cardElement.innerHTML = `<img src="${imgUrl}" alt="${special.name || 'Special'}" class="card-artwork" onerror="this.src='https://placehold.co/180x270/151922/ff4545?text=Action+Art'">`;
                        deckGrid.appendChild(cardElement);
                    });
                } else {
                    deckGrid.innerHTML = '<div class="status-message">Error: "specialsData" action array missing or empty in specials.js</div>';
                }
            }
        }

        // Connect structural navigation triggers to module functions
        tabCharBtn.addEventListener('click', () => switchDeck('characters'));
        tabSpecBtn.addEventListener('click', () => switchDeck('specials'));
    </script>
</body>
</html>
